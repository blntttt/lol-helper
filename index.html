<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rift Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c89b3c;--gold-light:#f0e6c8;--dark:#0a0a0f;--dark2:#12121a;
  --dark3:#1a1a26;--dark4:#22223a;--border:rgba(200,155,60,0.18);
  --border-bright:rgba(200,155,60,0.45);--text:#e8e0d0;--muted:#8a8070;
  --red:#c84b4b;--green:#4b9c5a;--blue:#4b6fac;--teal:#3a8a80;
}
html{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body{min-height:100vh;background:radial-gradient(ellipse 80% 40% at 50% -5%,rgba(200,155,60,0.10) 0%,transparent 60%),var(--dark)}
a{color:var(--gold);text-decoration:none}

/* HEADER */
header{text-align:center;padding:3rem 1rem 1.5rem;position:relative}
header::after{content:'';display:block;width:220px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:1.5rem auto 0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,8vw,5rem);letter-spacing:.08em;color:var(--gold);line-height:1}
.logo span{color:var(--text)}
.tagline{font-size:.78rem;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;margin-top:.4rem}

/* SEARCH */
.search-wrap{max-width:580px;margin:2rem auto 0;padding:0 1rem}
.search-box{display:flex;border:1px solid var(--border-bright);border-radius:4px;overflow:hidden;background:var(--dark2);transition:border-color .2s}
.search-box:focus-within{border-color:var(--gold)}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;padding:.85rem 1.25rem}
.search-box input::placeholder{color:var(--muted)}
.search-box button{background:var(--gold);border:none;color:var(--dark);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;padding:0 1.6rem;cursor:pointer;transition:background .15s;white-space:nowrap}
.search-box button:hover{background:var(--gold-light)}
.pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:1rem}
.pill{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.76rem;padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--gold);color:var(--gold)}

/* FILTER BAR */
.filter-bar{max-width:900px;margin:1.5rem auto 0;padding:0 1rem;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.filter-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.76rem;padding:5px 14px;border-radius:3px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.08em}
.filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(200,155,60,.07)}

/* MAIN */
main{max-width:900px;margin:2.5rem auto 4rem;padding:0 1rem}

/* CHAMPION GRID (browse) */
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.champ-card{background:var(--dark2);border:1px solid var(--border);border-radius:4px;padding:1rem .75rem;cursor:pointer;transition:all .18s;text-align:center}
.champ-card:hover{border-color:var(--gold);background:var(--dark3);transform:translateY(-2px)}
.champ-card .name{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.06em;color:var(--gold);margin-bottom:4px}
.champ-card .role-tag{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* GUIDE VIEW */
.guide{display:none;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.guide.active{display:block}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:6px 16px;border-radius:3px;cursor:pointer;transition:all .15s;margin-bottom:1.5rem}
.back-btn:hover{border-color:var(--gold);color:var(--gold)}

.guide-header{margin-bottom:2rem;border-bottom:1px solid var(--border);padding-bottom:1.5rem}
.guide-header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,4rem);letter-spacing:.06em;color:var(--gold);line-height:1}
.guide-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:.6rem}
.badge{font-size:.7rem;padding:3px 10px;border-radius:2px;text-transform:uppercase;letter-spacing:.1em;font-weight:500}
.badge.mode-aram{background:rgba(75,111,172,.2);border:1px solid rgba(75,111,172,.4);color:#7a9fd4}
.badge.mode-normal{background:rgba(75,156,90,.15);border:1px solid rgba(75,156,90,.35);color:#7ac48a}
.badge.diff-easy{background:rgba(75,156,90,.15);border:1px solid rgba(75,156,90,.3);color:#7ac48a}
.badge.diff-medium{background:rgba(200,155,60,.12);border:1px solid rgba(200,155,60,.3);color:var(--gold)}
.badge.diff-hard{background:rgba(200,75,75,.12);border:1px solid rgba(200,75,75,.3);color:#d47a7a}
.guide-summary{margin-top:.8rem;font-size:.95rem;color:var(--text);line-height:1.7;max-width:640px}

/* MODE TABS */
.mode-tabs{display:flex;gap:4px;margin-bottom:2rem}
.mode-tab{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;padding:8px 24px;border-radius:3px;cursor:pointer;transition:all .15s}
.mode-tab:hover{border-color:var(--gold);color:var(--gold)}
.mode-tab.active{background:var(--gold);color:var(--dark);border-color:var(--gold)}

/* SECTIONS */
.sections{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:600px){.sections{grid-template-columns:1fr}}
.section{background:var(--dark2);border:1px solid var(--border);border-radius:4px;padding:1.25rem}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;color:var(--gold);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.section.full{grid-column:1/-1}

/* ITEMS */
.item-row{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-num{min-width:22px;height:22px;border-radius:50%;background:var(--dark4);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:500;color:var(--muted);flex-shrink:0;margin-top:2px}
.item-name{font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:2px}
.item-why{font-size:.78rem;color:var(--muted);line-height:1.5}

/* ABILITIES */
.ability-row{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.ability-row:last-child{border-bottom:none}
.ability-key{min-width:34px;height:34px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:500;color:#fff;flex-shrink:0;font-family:'Bebas Neue',sans-serif;letter-spacing:.05em;font-size:.9rem}
.key-passive{background:#555060}
.key-q{background:#185fa5}
.key-w{background:#0f6e56}
.key-e{background:#7a4f0a}
.key-r{background:#7a2040}
.ability-name{font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:2px}
.ability-plain{font-size:.78rem;color:var(--muted);line-height:1.5}

/* TIPS */
.tips-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.tips-list li{font-size:.82rem;color:var(--muted);line-height:1.55;padding-left:1rem;position:relative}
.tips-list li::before{content:'—';position:absolute;left:0;color:var(--gold)}

/* NOT FOUND */
.not-found{text-align:center;padding:4rem 1rem;color:var(--muted)}
.not-found h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--text);letter-spacing:.06em;margin-bottom:.5rem}

/* FOOTER */
footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.72rem;border-top:1px solid var(--border)}
</style>
</head>
<body>

<header>
  <div class="logo">Rift<span>Guide</span></div>
  <div class="tagline">League of Legends · Champion Builds &amp; Abilities</div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input id="search-input" type="text" placeholder="aram mordekaiser · normal lux · aram jinx..." autocomplete="off"/>
    <button onclick="doSearch()">Search</button>
  </div>
  <div class="pills" id="quick-pills"></div>
</div>

<div class="filter-bar" id="filter-bar"></div>

<main>
  <div id="browse-view">
    <div class="champ-grid" id="champ-grid"></div>
  </div>
  <div class="guide" id="guide-view">
    <button class="back-btn" onclick="showBrowse()">← Back to all champions</button>
    <div class="guide-header">
      <h1 id="g-name"></h1>
      <div class="guide-meta" id="g-meta"></div>
      <p class="guide-summary" id="g-summary"></p>
    </div>
    <div class="mode-tabs" id="mode-tabs"></div>
    <div class="sections" id="g-sections"></div>
  </div>
  <div id="not-found" style="display:none" class="not-found">
    <h2>Champion not found</h2>
    <p>Try searching by name — e.g. "aram mordekaiser" or "normal lux"</p>
  </div>
</main>

<footer>
  Not affiliated with Riot Games. Builds reflect Patch 26.9 meta (Season 2026: Pandemonium). Use in-game client for patch-specific updates.
</footer>

function buildGrid(champs) {
  const grid = document.getElementById('champ-grid');
  grid.innerHTML = '';
  champs.forEach(name => {

    card.className = 'champ-card';

}

// Search
function doSearch() {
  const raw = document.getElementById('search-input').value.trim().toLowerCase();
  if (!raw) return;
  const modes = ['aram','normal','ranked','urf'];
  let mode = 'aram', champName = '';
  const parts = raw.split(/\s+/);
  if (modes.includes(parts[0])) { mode = parts[0]; champName = parts.slice(1).join(' '); }
  else if (parts.length > 1 && modes.includes(parts[parts.length-1])) { mode = parts[parts.length-1]; champName = parts.slice(0,-1).join(' '); }
  else { champName = parts.join(' '); }
  champName = champName.trim();

  // Check aliases first (e.g. "morde" → "Mordekaiser", "chogath" → "Cho'Gath")
  let resolvedName = ALIASES[champName] || champName;

  // Improved matching: exact, startsWith, includes, and fuzzy (remove spaces/apostrophes)
  const normalized = resolvedName.replace(/['\s]/g, '').toLowerCase();
  const match = ALL_CHAMPS.find(c => c.toLowerCase() === resolvedName) ||
                ALL_CHAMPS.find(c => c.toLowerCase().startsWith(resolvedName)) ||
                ALL_CHAMPS.find(c => c.toLowerCase().includes(resolvedName)) ||
                ALL_CHAMPS.find(c => c.replace(/['\s]/g, '').toLowerCase() === normalized) ||
                ALL_CHAMPS.find(c => c.replace(/['\s]/g, '').toLowerCase().includes(normalized));

  if (match) { showGuide(match, mode); }
  else {
    document.getElementById('browse-view').style.display = 'none';
    document.getElementById('guide-view').classList.remove('active');
    document.getElementById('not-found').style.display = 'block';
  }
}

document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// Show guide
function showGuide(name, mode) {
  currentChamp = name;
  currentMode = (mode === 'normal' || mode === 'ranked') ? 'normal' : 'aram';
  const d = DATA[name];

  document.getElementById('g-name').textContent = name;

  const modeLabel = currentMode === 'aram' ? 'ARAM' : 'Normal/Ranked';
  document.getElementById('g-meta').innerHTML =
    `<span class="badge mode-${currentMode}">${modeLabel}</span>` +
    `<span class="badge diff-${d.difficulty.toLowerCase()}">${d.difficulty}</span>` +
    `<span style="font-size:.8rem;color:var(--muted)">${d.role}</span>`;

  document.getElementById('g-summary').textContent = d.summary;

  // Mode tabs
  const tabs = document.getElementById('mode-tabs');
  tabs.innerHTML = '';
  ['aram','normal'].forEach(m => {
    const b = document.createElement('button');
    b.className = 'mode-tab' + (m === currentMode ? ' active' : '');
    b.textContent = m === 'aram' ? 'ARAM' : 'Normal / Ranked';
    b.onclick = () => { currentMode = m; renderSections(); tabs.querySelectorAll('.mode-tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); document.getElementById('g-meta').innerHTML = `<span class="badge mode-${currentMode}">${currentMode==='aram'?'ARAM':'Normal/Ranked'}</span><span class="badge diff-${d.difficulty.toLowerCase()}">${d.difficulty}</span><span style="font-size:.8rem;color:var(--muted)">${d.role}</span>`; };
    tabs.appendChild(b);
  });

  renderSections();

  document.getElementById('browse-view').style.display = 'none';
  document.getElementById('not-found').style.display = 'none';
  document.getElementById('guide-view').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

  sec.innerHTML = `

      <div class="section-title">Item Build</div>
      ${itemsHtml}
    </div>
    <div class="section">

}

function showBrowse() {
  document.getElementById('guide-view').classList.remove('active');
  document.getElementById('not-found').style.display = 'none';
  document.getElementById('browse-view').style.display = 'block';
  document.getElementById('search-input').value = '';
  filterGrid(activeFilter);
}
